<!doctype html>
<html lang="en">
  <head>
    <!--
      ╔══════════════════════════════════════════════════════╗
      ║  This installation is made by Jonathon Toon          ║
      ║  https://www.jonathontoon.com                          ║
      ║  https://www.x.com/jonathontoon                       ║
      ╚══════════════════════════════════════════════════════╝
    -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a1424" />
    <title>Remember Me as a Time of Day</title>
    <link rel="icon" id="favicon" href="data:," />
    <link rel="stylesheet" href="/dist/styles.css" />
  </head>
  <body class="m-0 min-w-[320px] bg-[#0b1220] font-sans antialiased">
    <main
      class="relative isolate min-h-[100svh] overflow-hidden bg-[#0b1220]"
      aria-label="A time of day, a living sky gradient"
    >
      <canvas
        id="sky"
        class="absolute inset-0 block h-full w-full"
        aria-hidden="true"
      ></canvas>

      <button
        class="absolute right-7 top-7 z-10 grid size-8 place-items-center rounded-full border border-white/20 bg-white/[.08] text-[13px] font-medium leading-none text-white/80 shadow-[0_1px_1px_rgba(255,255,255,.15)_inset,0_8px_24px_rgba(0,0,0,.08)] backdrop-blur-2xl transition duration-200 hover:border-white/40 hover:bg-white/[.16] hover:text-white focus:outline-none focus:ring-2 focus:ring-white/30 focus:ring-offset-2 focus:ring-offset-transparent active:scale-95 max-sm:right-5 max-sm:top-5"
        id="info-trigger"
        type="button"
        aria-label="About this installation"
        aria-expanded="false"
      >
        i
      </button>

      <section
        class="pointer-events-none absolute right-7 top-[4.5rem] z-10 w-[292px] translate-y-[-8px] rounded-[22px] border border-white/[.16] bg-black/[.18] p-5 pr-11 text-white/90 opacity-0 shadow-[0_24px_70px_rgba(0,0,0,.2),0_1px_1px_rgba(255,255,255,.12)_inset] backdrop-blur-3xl transition-[opacity,transform] duration-300 ease-out max-sm:right-5 max-sm:w-[calc(100vw-40px)]"
        id="info-panel"
        aria-hidden="true"
        aria-label="About this installation"
      >
        <button
          class="absolute right-3.5 top-3.5 grid size-6 place-items-center rounded-full bg-white/[.08] p-0 text-base font-normal leading-none text-white/60 transition hover:bg-white/[.16] hover:text-white focus:outline-none focus:ring-2 focus:ring-white/30"
          id="info-close"
          type="button"
          aria-label="Close information"
        >
          ×
        </button>
        <p class="text-[13px] font-medium leading-[1.45] tracking-[-.01em]">
          A living WebGL gradient that follows the time of day where you are.
        </p>
        <p
          class="mt-3 text-[11px] font-normal leading-[1.5] tracking-[.01em] text-white/60"
        >
          Move the faint line at the bottom to explore the full cycle.
        </p>
      </section>
    </main>
    <script type="module" src="/dist/main.js"></script>
  </body>
</html>
